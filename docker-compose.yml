services:
  postgres:
    image: postgres:16-alpine
    container_name: lankastay-db
    environment:
      POSTGRES_DB: lankastay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/LankaStay.API
      dockerfile: Dockerfile
    container_name: lankastay-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=lankastay;Username=postgres;Password=postgres"
      Jwt__Key: "LankaStay_SuperSecret_JWT_Key_2024_Must_Be_At_Least_32_Chars"
      Jwt__Issuer: "LankaStayAPI"
      Jwt__Audience: "LankaStayClient"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: lankastay-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
